<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#f8fbff"/>
    <stop offset="55%" stop-color="#edf4ff"/>
    <stop offset="100%" stop-color="#e4edff"/>
  </linearGradient>

  <radialGradient id="leftGlow">
    <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.16"/>
    <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="rightGlow">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
    <stop offset="50%" stop-color="#6366f1" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </linearGradient>

  <filter id="blur">
    <feGaussianBlur stdDeviation="55"/>
  </filter>
</defs>

<rect width="1600" height="900" fill="url(#bg)"/>

<circle cx="1450" cy="80" r="260" fill="url(#rightGlow)" filter="url(#blur)"/>
<circle cx="150" cy="820" r="260" fill="url(#leftGlow)" filter="url(#blur)"/>

<path d="M0 690 C220 630 420 800 720 730 S1180 610 1600 700"
      fill="none"
      stroke="url(#wave)"
      stroke-width="3"/>

<path d="M0 770 C260 710 520 880 900 790 S1320 660 1600 760"
      fill="none"
      stroke="#60a5fa"
      stroke-opacity="0.15"
      stroke-width="2"/>

<circle cx="1280" cy="180" r="48" fill="none" stroke="#3b82f6" stroke-opacity="0.14" stroke-width="2"/>
<circle cx="300" cy="610" r="32" fill="none" stroke="#8b5cf6" stroke-opacity="0.14" stroke-width="2"/>

</svg>
